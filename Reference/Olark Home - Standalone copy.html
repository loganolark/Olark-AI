document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  font-display: swap;\n  src: url(\"1aa92e4f-dfda-4841-ad7e-085fc4ea5542\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>/* ========== OLARK AI — DESIGN TOKENS ========== */\n:root {\n  /* ===== OLARK OFFICIAL BRAND PALETTE (per style guide Feb 2022) ===== */\n  /* Base colors */\n  --purple: #3d3683;             /* Olark Purple — primary */\n  --navy: #272d3f;               /* Navy — text/depth */\n  --charcoal: #4e5458;           /* Charcoal — body text */\n  --grey: #f3f3f3;               /* Grey — backgrounds */\n\n  /* Accent colors */\n  --green: #6fc284;              /* Green — flourishes (decorative only) */\n  --green-text: #2d6939;         /* AA-safe green for text */\n  --pink: #ef4e73;               /* Pink — flourishes */\n  --violet: #675ac9;             /* Violet — accent text */\n  --yellow: #fac917;             /* Yellow — overlay shapes, nav text on purple */\n\n  /* Derived tones */\n  --purple-deep: #2d2862;\n  --purple-soft: #ebe9f5;\n  --purple-ink: #2d2862;\n  --green-deep: #4a9b5e;\n  --green-soft: #e3f3e8;\n  --green-ink: #2d6939;\n  --pink-deep: #d63459;\n  --pink-soft: #fce3e9;\n  --yellow-soft: #fef2cc;\n  --violet-soft: #e6e3f8;\n\n  /* Surfaces */\n  --bg: #ffffff;                 /* clean white base — color comes from sections */\n  --bg-elev: #ffffff;\n  --bg-deep: #efecf7;            /* pale violet section */\n  --bg-cream: #fdf4d4;           /* warm yellow-cream section */\n\n  /* Text */\n  --ink: var(--navy);\n  --ink-2: var(--charcoal);\n  --ink-3: #5d6469;            /* AA on white (5.0:1) */\n  --ink-4: #7d8389;            /* decorative only — not for body text */\n  --line: #d8d9de;\n  --line-2: #b8bbc2;\n  --line-mono: #2c2f36;        /* heavy industrial rule */\n\n  /* Backwards-compat aliases */\n  --teal: var(--purple);\n  --teal-deep: var(--purple-deep);\n  --teal-soft: var(--purple-soft);\n  --teal-ink: var(--purple-ink);\n  --coral: var(--pink);\n  --coral-deep: var(--pink-deep);\n  --coral-soft: var(--pink-soft);\n  --coral-ink: var(--pink-deep);\n  --rust: var(--pink);\n  --rust-soft: var(--pink-soft);\n  --sun: var(--yellow);\n  --sun-deep: #d9a800;           /* decorative only */\n  --sun-text: #7a5d00;           /* AA on white */\n  --sun-soft: var(--yellow-soft);\n  --amber: var(--yellow);\n  --navy-soft: var(--purple-soft);\n  --mint: var(--green);\n  --mint-soft: var(--green-soft);\n\n  /* Type */\n  --font-display: \"Inter Tight\", ui-sans-serif, system-ui, sans-serif;\n  --font-body: \"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Spacing scale (rem) */\n  --s-1: 0.25rem;\n  --s-2: 0.5rem;\n  --s-3: 0.75rem;\n  --s-4: 1rem;\n  --s-5: 1.5rem;\n  --s-6: 2rem;\n  --s-7: 3rem;\n  --s-8: 4rem;\n  --s-9: 6rem;\n  --s-10: 8rem;\n\n  /* Radii */\n  --r-1: 6px;\n  --r-2: 10px;\n  --r-3: 14px;\n  --r-4: 20px;\n  --r-pill: 999px;\n\n  /* Shadows — subtle, not gradient slop */\n  --shadow-sm: 0 1px 2px rgba(20, 30, 40, 0.04), 0 1px 1px rgba(20, 30, 40, 0.03);\n  --shadow-md: 0 4px 12px rgba(20, 30, 40, 0.06), 0 2px 4px rgba(20, 30, 40, 0.04);\n  --shadow-lg: 0 16px 40px rgba(20, 30, 40, 0.08), 0 4px 12px rgba(20, 30, 40, 0.05);\n\n  /* Layout */\n  --container: 1200px;\n  --container-narrow: 880px;\n}\n\n/* ========== RESET ========== */\n*, *::before, *::after { box-sizing: border-box; }\nhtml { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: 17px;\n  line-height: 1.55;\n  color: var(--ink);\n  background: var(--bg);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nsection { background-clip: padding-box; }\nsection.color-purple { background: var(--purple); color: white; }\nsection.color-green { background: var(--green-soft); }\nsection.color-coral { background: var(--coral-soft); }\nsection.color-sun { background: var(--sun-soft); }\nimg, svg { display: block; max-width: 100%; }\nbutton { font: inherit; cursor: pointer; border: 0; background: 0; color: inherit; }\na { color: var(--teal-deep); text-decoration: none; }\na:hover { text-decoration: underline; text-underline-offset: 3px; }\n\n/* Focus — visible & WCAG */\n*:focus-visible {\n  outline: 2px solid var(--teal);\n  outline-offset: 3px;\n  border-radius: 3px;\n}\n\n/* Skip link for keyboard users */\n.skip-link {\n  position: absolute;\n  left: -9999px;\n  top: 0;\n  background: var(--ink);\n  color: var(--bg);\n  padding: var(--s-3) var(--s-4);\n  z-index: 100;\n  border-radius: 0 0 var(--r-2) 0;\n}\n.skip-link:focus { left: 0; }\n\n/* ========== TYPE ========== */\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  line-height: 1.05;\n  color: var(--ink);\n  margin: 0;\n  text-wrap: balance;\n}\nh1 { font-size: clamp(2.4rem, 5.5vw, 4.4rem); letter-spacing: -0.035em; }\nh2 { font-size: clamp(1.8rem, 3.5vw, 2.8rem); letter-spacing: -0.028em; }\nh3 { font-size: clamp(1.25rem, 2vw, 1.5rem); }\nh4 { font-size: 1.05rem; font-weight: 600; }\np { margin: 0; text-wrap: pretty; }\n\n.hl-purple { color: var(--purple); }\n.hl-green { color: var(--green-text); }\n.hl-coral { color: var(--coral-deep); }\n.hl-underline {\n  background-image: linear-gradient(transparent 65%, var(--sun) 65%, var(--sun) 92%, transparent 92%);\n  background-repeat: no-repeat;\n  padding: 0 4px;\n}\n.hl-teal { color: var(--purple); }\n\n/* Brand decorative squiggle (Olark uses these on their site) */\n.squiggle {\n  display: inline-block;\n  vertical-align: middle;\n}\n.squiggle path { stroke-linecap: round; stroke-linejoin: round; }\n\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 0.78rem;\n  font-weight: 600;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--coral-deep);\n  display: inline-flex;\n  align-items: center;\n  gap: var(--s-2);\n}\n.eyebrow::before {\n  content: \"\";\n  width: 18px;\n  height: 1px;\n  background: currentColor;\n}\n\n.lede { font-size: 1.18rem; line-height: 1.55; color: var(--ink-2); max-width: 56ch; }\n\n/* ========== LAYOUT ========== */\n.container {\n  width: 100%;\n  max-width: var(--container);\n  margin: 0 auto;\n  padding: 0 var(--s-5);\n}\n.container-narrow {\n  max-width: var(--container-narrow);\n  margin: 0 auto;\n  padding: 0 var(--s-5);\n}\nsection { padding: var(--s-9) 0; }\n@media (max-width: 720px) { section { padding: var(--s-8) 0; } }\n\n/* ========== BUTTONS ========== */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--s-2);\n  padding: var(--s-3) var(--s-5);\n  border-radius: var(--r-pill);\n  font-weight: 500;\n  font-size: 0.98rem;\n  transition: transform 0.12s ease, background 0.16s ease, box-shadow 0.16s ease;\n  white-space: nowrap;\n}\n.btn-primary {\n  background: var(--purple);\n  color: white;\n  box-shadow: 0 2px 10px rgba(61, 54, 131, 0.3);\n}\n.btn-primary:hover {\n  background: var(--purple-deep);\n  text-decoration: none;\n  transform: translateY(-1px);\n  box-shadow: 0 4px 16px rgba(61, 54, 131, 0.4);\n}\n.btn-coral {\n  background: var(--coral);\n  color: white;\n}\n.btn-coral:hover {\n  background: var(--coral-deep);\n  text-decoration: none;\n  transform: translateY(-1px);\n}\n.btn-green {\n  background: var(--green);\n  color: oklch(0.20 0.05 145);\n}\n.btn-green:hover {\n  background: var(--green-deep);\n  color: white;\n  text-decoration: none;\n  transform: translateY(-1px);\n}\n.btn-ghost {\n  background: transparent;\n  color: var(--ink);\n  border: 1px solid var(--line-2);\n}\n.btn-ghost:hover {\n  border-color: var(--ink);\n  text-decoration: none;\n  background: var(--bg-elev);\n}\n.btn-teal {\n  background: var(--green);\n  color: oklch(0.20 0.05 145);\n}\n.btn-teal:hover {\n  background: var(--green-deep);\n  color: white;\n  text-decoration: none;\n  transform: translateY(-1px);\n}\n.btn-arrow::after {\n  content: \"→\";\n  display: inline-block;\n  transition: transform 0.18s ease;\n}\n.btn-arrow:hover::after { transform: translateX(3px); }\n\n/* ========== NAV ========== */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  background: color-mix(in oklch, var(--bg) 80%, transparent);\n  backdrop-filter: saturate(180%) blur(12px);\n  -webkit-backdrop-filter: saturate(180%) blur(12px);\n  border-bottom: 1px solid var(--line);\n}\n.nav-inner {\n  max-width: var(--container);\n  margin: 0 auto;\n  padding: var(--s-3) var(--s-5);\n  display: flex;\n  align-items: center;\n  gap: var(--s-6);\n}\n.brand {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--s-2);\n  font-family: var(--font-display);\n  font-weight: 700;\n  letter-spacing: -0.025em;\n  font-size: 1.35rem;\n  color: var(--ink);\n  flex-shrink: 0;\n  white-space: nowrap;\n}\n.brand:hover { text-decoration: none; }\n.brand-mark {\n  width: 38px;\n  height: 38px;\n  border-radius: 50%;\n  background: var(--purple);\n  display: inline-grid;\n  place-items: center;\n  color: var(--yellow);\n  font-family: var(--font-display);\n  font-size: 20px;\n  font-weight: 800;\n  font-style: italic;\n  position: relative;\n  overflow: visible;\n  box-shadow: 0 2px 10px rgba(61, 54, 131, 0.35);\n}\n.brand-mark::after {\n  content: \"\";\n  position: absolute;\n  inset: auto -3px -3px auto;\n  width: 14px;\n  height: 14px;\n  border-radius: 50%;\n  background: var(--green);\n  border: 2px solid white;\n}\n.brand .brand-ai {\n  color: var(--purple);\n  font-weight: 700;\n  font-style: italic;\n}\n.nav-links {\n  display: flex;\n  gap: var(--s-5);\n  list-style: none;\n  margin: 0;\n  padding: 0;\n}\n.nav-links a {\n  color: var(--ink-2);\n  font-size: 0.95rem;\n  font-weight: 500;\n}\n.nav-links a:hover, .nav-links a.is-active {\n  color: var(--ink);\n  text-decoration: none;\n}\n.nav-links a.is-active { color: var(--teal-deep); }\n.nav-spacer { flex: 1; }\n@media (max-width: 720px) {\n  .nav-links { display: none; }\n}\n\n/* ========== FOOTER ========== */\n.footer {\n  border-top: 1px solid var(--line);\n  padding: var(--s-7) 0 var(--s-6);\n  margin-top: var(--s-8);\n  font-size: 0.92rem;\n  color: var(--ink-3);\n}\n.footer-inner {\n  display: grid;\n  grid-template-columns: 2fr 1fr 1fr 1fr;\n  gap: var(--s-6);\n}\n.footer h4 {\n  font-family: var(--font-mono);\n  font-size: 0.72rem;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--ink);\n  margin-bottom: var(--s-3);\n}\n.footer ul { list-style: none; padding: 0; margin: 0; display: grid; gap: var(--s-2); }\n.footer a { color: var(--ink-2); }\n.footer a:hover { color: var(--ink); }\n.footer-bottom {\n  border-top: 1px solid var(--line);\n  margin-top: var(--s-6);\n  padding-top: var(--s-4);\n  display: flex;\n  justify-content: space-between;\n  font-size: 0.85rem;\n}\n@media (max-width: 720px) {\n  .footer-inner { grid-template-columns: 1fr 1fr; }\n}\n\n/* ========== UTIL ========== */\n.tag {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 10px;\n  border-radius: var(--r-pill);\n  background: var(--coral-soft);\n  color: var(--coral-ink);\n  font-family: var(--font-mono);\n  font-size: 0.72rem;\n  font-weight: 600;\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.tag-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--coral);\n  box-shadow: 0 0 0 0 currentColor;\n  animation: pulse 2s infinite;\n}\n@keyframes pulse {\n  0%, 100% { box-shadow: 0 0 0 0 var(--teal); }\n  50% { box-shadow: 0 0 0 4px transparent; }\n}\n\n.divider {\n  height: 1px;\n  background: var(--line);\n  margin: var(--s-7) 0;\n}\n\n/* Subtle grid background for industrial flavor */\n.bg-grid {\n  background-image:\n    linear-gradient(var(--line) 1px, transparent 1px),\n    linear-gradient(90deg, var(--line) 1px, transparent 1px);\n  background-size: 32px 32px;\n  background-position: -1px -1px;\n}\n\n/* sr-only for a11y */\n.sr-only {\n  position: absolute;\n  width: 1px; height: 1px;\n  padding: 0; margin: -1px;\n  overflow: hidden; clip: rect(0,0,0,0);\n  white-space: nowrap; border: 0;\n}\n\n/* Reduce motion */\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n    scroll-behavior: auto !important;\n  }\n}\n<\u002Fstyle>\n<style>/* ========== OLARK BOT WIDGET ========== */\nolark-bot { display: block; }\n\n.bot-shell {\n  display: flex;\n  flex-direction: column;\n  background: var(--bg-elev);\n  border: 1px solid var(--line);\n  border-radius: var(--r-4);\n  box-shadow: var(--shadow-lg);\n  overflow: hidden;\n  height: 560px;\n  max-height: 80vh;\n  font-family: var(--font-body);\n}\n\n.bot-shell.bot-full {\n  height: 640px;\n}\n\n/* HEAD */\n.bot-head {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  padding: var(--s-3) var(--s-4);\n  border-bottom: 1px solid var(--line);\n  background: var(--bg);\n}\n.bot-avatar {\n  width: 38px;\n  height: 38px;\n  border-radius: 12px;\n  background: var(--ink);\n  position: relative;\n  flex-shrink: 0;\n  display: grid;\n  place-items: center;\n  overflow: hidden;\n}\n.bot-avatar::before {\n  content: \"B\";\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 16px;\n  color: var(--bg);\n  z-index: 1;\n}\n.bot-avatar-dot {\n  position: absolute;\n  inset: auto 4px 4px auto;\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--teal);\n  box-shadow: 0 0 0 2px var(--ink);\n  z-index: 2;\n}\n.bot-head-text { flex: 1; min-width: 0; }\n.bot-name {\n  font-weight: 600;\n  font-size: 0.98rem;\n  color: var(--ink);\n}\n.bot-handle {\n  font-weight: 400;\n  color: var(--ink-3);\n  font-size: 0.86rem;\n}\n.bot-status {\n  font-size: 0.78rem;\n  color: var(--ink-3);\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  margin-top: 2px;\n}\n.bot-status-dot {\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: oklch(0.65 0.16 145);\n}\n.bot-poweredby {\n  font-family: var(--font-mono);\n  font-size: 0.7rem;\n  color: var(--ink-3);\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n}\n\n/* MESSAGES */\n.bot-messages {\n  flex: 1;\n  overflow-y: auto;\n  padding: var(--s-5) var(--s-4);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-3);\n  background:\n    radial-gradient(circle at 30% 0%, oklch(0.96 0.02 185) 0%, transparent 50%),\n    var(--bg-elev);\n  scroll-behavior: smooth;\n}\n.bot-msg {\n  display: flex;\n  gap: var(--s-2);\n  max-width: 88%;\n  animation: msgIn 0.28s ease-out;\n}\n@keyframes msgIn {\n  from { opacity: 0; transform: translateY(6px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.bot-msg-avatar {\n  width: 28px; height: 28px;\n  border-radius: 8px;\n  background: var(--ink);\n  flex-shrink: 0;\n  display: grid;\n  place-items: center;\n  position: relative;\n}\n.bot-msg-avatar::before {\n  content: \"B\";\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: 12px;\n  color: var(--bg);\n}\n.bot-msg-avatar span {\n  position: absolute;\n  inset: auto 2px 2px auto;\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--teal);\n  box-shadow: 0 0 0 1.5px var(--ink);\n}\n.bot-msg-bubble {\n  padding: var(--s-3) var(--s-4);\n  border-radius: 14px;\n  font-size: 0.96rem;\n  line-height: 1.5;\n  background: var(--bg-deep);\n  color: var(--ink);\n  border-top-left-radius: 4px;\n}\n.bot-msg-user {\n  align-self: flex-end;\n  flex-direction: row-reverse;\n}\n.bot-msg-user .bot-msg-bubble {\n  background: var(--ink);\n  color: var(--bg);\n  border-radius: 14px;\n  border-top-right-radius: 4px;\n}\n.bot-msg-system {\n  font-family: var(--font-mono);\n  font-size: 0.78rem;\n  color: var(--ink-3);\n  text-align: center;\n  padding: var(--s-2);\n  align-self: center;\n}\n\n/* TYPING */\n.bot-typing .bot-msg-bubble {\n  display: inline-flex;\n  gap: 4px;\n  padding: 14px 16px;\n}\n.bot-typing .dot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--ink-3);\n  animation: typing 1.2s infinite;\n}\n.bot-typing .dot:nth-child(2) { animation-delay: 0.15s; }\n.bot-typing .dot:nth-child(3) { animation-delay: 0.3s; }\n@keyframes typing {\n  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }\n  30% { transform: translateY(-4px); opacity: 1; }\n}\n\n/* CHIPS */\n.bot-chips {\n  display: flex;\n  gap: var(--s-2);\n  padding: 0 var(--s-4) var(--s-3);\n  flex-wrap: wrap;\n}\n.bot-chip {\n  padding: 7px 12px;\n  border-radius: var(--r-pill);\n  background: var(--bg-elev);\n  border: 1px solid var(--line-2);\n  font-size: 0.84rem;\n  color: var(--ink-2);\n  transition: all 0.15s ease;\n  white-space: nowrap;\n}\n.bot-chip:hover {\n  border-color: var(--teal);\n  color: var(--teal-deep);\n  background: var(--teal-soft);\n}\n\n/* FORM */\n.bot-form {\n  display: flex;\n  gap: var(--s-2);\n  padding: var(--s-3) var(--s-4);\n  border-top: 1px solid var(--line);\n  background: var(--bg-elev);\n}\n.bot-input {\n  flex: 1;\n  padding: var(--s-3) var(--s-4);\n  border-radius: var(--r-pill);\n  border: 1px solid var(--line-2);\n  background: var(--bg);\n  font-size: 0.96rem;\n  font-family: var(--font-body);\n  color: var(--ink);\n}\n.bot-input::placeholder { color: var(--ink-3); }\n.bot-input:focus {\n  outline: 2px solid var(--teal);\n  outline-offset: 1px;\n  border-color: var(--teal);\n}\n.bot-send {\n  width: 44px; height: 44px;\n  border-radius: 50%;\n  background: var(--ink);\n  color: var(--bg);\n  display: grid;\n  place-items: center;\n  transition: background 0.15s ease, transform 0.15s ease;\n  flex-shrink: 0;\n}\n.bot-send:hover:not(:disabled) {\n  background: var(--teal-deep);\n  transform: scale(1.04);\n}\n.bot-send:disabled {\n  opacity: 0.5;\n  cursor: not-allowed;\n}\n\n/* ROUTING CARD */\n.bot-route {\n  display: flex;\n  flex-direction: column;\n  align-items: stretch;\n  gap: var(--s-2);\n  padding: var(--s-2) 0;\n  align-self: stretch;\n  animation: routeIn 0.5s ease-out;\n}\n@keyframes routeIn {\n  from { opacity: 0; transform: translateY(8px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.bot-route-line {\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--teal), transparent);\n}\n.bot-route-card {\n  background: var(--teal-soft);\n  border: 1px solid var(--teal);\n  border-radius: var(--r-3);\n  padding: var(--s-3) var(--s-4);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-3);\n}\n.bot-route-head {\n  font-family: var(--font-mono);\n  font-size: 0.76rem;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  color: var(--teal-ink);\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n  font-weight: 600;\n}\n.bot-route-pulse {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--teal);\n  position: relative;\n}\n.bot-route-pulse::before {\n  content: \"\";\n  position: absolute;\n  inset: -3px;\n  border-radius: 50%;\n  border: 2px solid var(--teal);\n  animation: ring 1.6s infinite;\n  opacity: 0;\n}\n@keyframes ring {\n  0% { transform: scale(0.6); opacity: 1; }\n  100% { transform: scale(1.6); opacity: 0; }\n}\n.bot-route-rep {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n}\n.bot-route-avatar {\n  width: 40px; height: 40px;\n  border-radius: 50%;\n  background: var(--rust);\n  color: white;\n  font-weight: 600;\n  display: grid;\n  place-items: center;\n  font-size: 16px;\n}\n.bot-route-name { font-weight: 600; color: var(--ink); }\n.bot-route-role { font-size: 0.84rem; color: var(--ink-2); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<a href=\"#main\" class=\"skip-link\">Skip to main content<\u002Fa>\n\n<!-- ========== NAV ========== -->\n<nav class=\"nav\" aria-label=\"Primary\">\n  <div class=\"nav-inner\">\n    <a href=\"index.html\" class=\"brand\" aria-label=\"Olark AI home\">\n      <span class=\"brand-mark\" aria-hidden=\"true\">O<\u002Fspan>\n      <span>Olark<span class=\"brand-ai\">.ai<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-spacer\"><\u002Fdiv>\n    <ul class=\"nav-links\">\n      <li><a href=\"how-it-works.html\">How it works<\u002Fa><\u002Fli>\n      <li><a href=\"pricing.html\">Pricing<\u002Fa><\u002Fli>\n      <li><a href=\"demo.html\">Live demo<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n    <\u002Ful>\n    <a href=\"#cta\" class=\"btn btn-primary btn-arrow\">Book a demo<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<main id=\"main\">\n\n<!-- ========== HERO ========== -->\n<section class=\"hero\">\n  <div class=\"container hero-inner\">\n    <div class=\"hero-text\">\n      <span class=\"eyebrow\">\n        <svg class=\"squiggle\" width=\"40\" height=\"10\" viewBox=\"0 0 40 10\" fill=\"none\" aria-hidden=\"true\"><path d=\"M2 5 Q 7 1, 12 5 T 22 5 T 32 5 T 38 5\" stroke=\"var(--green)\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>\n        Hey, we're Olark\n      <\u002Fspan>\n      <h1><span class=\"hl-purple\">AI<\u002Fspan> for <span class=\"hl-underline\">industrial suppliers.<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">We combine <strong>17 years of live chat expertise<\u002Fstrong> with cutting-edge AI to turn complex technical inquiries into high-value sales opportunities. Specifically engineered for the industrial supply sector.<\u002Fp>\n      <div class=\"hero-actions\">\n        <a href=\"#cta\" class=\"btn btn-primary btn-arrow\">Book a 20-min demo<\u002Fa>\n        <a href=\"#demo\" class=\"btn btn-ghost\">Try the bot below ↓<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-trust\">\n        <div class=\"hero-trust-item\">\n          <strong>4.2×<\u002Fstrong>\n          <span>more qualified RFQs<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"hero-trust-divider\" aria-hidden=\"true\"><\u002Fdiv>\n        <div class=\"hero-trust-item\">\n          <strong>&lt; 2&nbsp;sec<\u002Fstrong>\n          <span>median first response<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"hero-trust-divider\" aria-hidden=\"true\"><\u002Fdiv>\n        <div class=\"hero-trust-item\">\n          <strong>87%<\u002Fstrong>\n          <span>questions resolved without a human<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <aside class=\"hero-bot\" aria-label=\"Live chatbot demo\">\n      <div class=\"hero-bot-frame\">\n        <div class=\"hero-bot-tab\">\n          <span class=\"hero-bot-tab-dot\" style=\"background: oklch(0.7 0.16 30)\"><\u002Fspan>\n          <span class=\"hero-bot-tab-dot\" style=\"background: oklch(0.85 0.13 90)\"><\u002Fspan>\n          <span class=\"hero-bot-tab-dot\" style=\"background: oklch(0.7 0.14 145)\"><\u002Fspan>\n          <span class=\"hero-bot-tab-url\">crestline-industrial.com<\u002Fspan>\n        <\u002Fdiv>\n        <olark-bot><\u002Folark-bot>\n      <\u002Fdiv>\n      <p class=\"hero-bot-caption\">↑ Real bot, real Claude, real conversation. Try asking about bulk orders.<\u002Fp>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== LOGO STRIP ========== -->\n<section class=\"logos\">\n  <div class=\"container\">\n    <p class=\"logos-eyebrow\">Built for the unsexy stuff that runs the world<\u002Fp>\n    <div class=\"logos-grid\">\n      <div class=\"logo-item\">FASTENERS<\u002Fdiv>\n      <div class=\"logo-item\">BEARINGS<\u002Fdiv>\n      <div class=\"logo-item\">HYDRAULICS<\u002Fdiv>\n      <div class=\"logo-item\">VALVES &amp; FITTINGS<\u002Fdiv>\n      <div class=\"logo-item\">ELECTRICAL<\u002Fdiv>\n      <div class=\"logo-item\">MRO SUPPLY<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== PROBLEM ========== -->\n<section class=\"problem\">\n  <div class=\"container\">\n    <div class=\"problem-head\">\n      <span class=\"eyebrow\">The problem<\u002Fspan>\n      <h2>The web form was supposed to fix this.<br>It did not fix this.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"problem-grid\">\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">01<\u002Fdiv>\n        <h3>Buyers want specs, not brochures.<\u002Fh3>\n        <p>A maintenance manager at 11pm needs to know if your 3/4\" NPT fitting handles 3,000 PSI. They are not going to fill out a \"Contact Us\" form to find out.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">02<\u002Fdiv>\n        <h3>Your sales team is drowning in tire-kickers.<\u002Fh3>\n        <p>87% of inbound chats are \"do you ship to Manitoba\" and \"is this in stock\". Marcus has a $400k RFQ in his queue and he's answering \"what's the inner diameter\" for the eleventh time today.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">03<\u002Fdiv>\n        <h3>The real buyers leave.<\u002Fh3>\n        <p>If a procurement lead can't get an answer in 90 seconds, they pivot to your competitor. They don't fill out the form. They never come back. You never knew they were there.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== SOLUTION INTRO ========== -->\n<section class=\"solution-intro\">\n  <div class=\"container-narrow\">\n    <span class=\"eyebrow\">What we built instead<\u002Fspan>\n    <h2>We enhance the human moment.<br>We don't replace it.<\u002Fh2>\n    <p class=\"lede\" style=\"margin-top: var(--s-5)\">17 years building live chat taught us one thing: human conversation still closes the deal. AI just makes it sharper. Olark scans your site continuously — products, specs, services, the works — answering the repetitive questions instantly, then routing the buyer to your team the moment it's worth a human's time. Your reps get warmer leads. Your buyers get answers immediately. Everyone wins.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== BRAND STRIP ========== -->\n<section class=\"brand-strip\">\n  <div class=\"container\">\n    <div class=\"brand-strip-grid\">\n      <div class=\"brand-strip-stat\">\n        <div class=\"brand-strip-num\">17 years<\u002Fdiv>\n        <div class=\"brand-strip-lbl\">in the live chat industry<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brand-strip-stat\">\n        <div class=\"brand-strip-num\">Engineered for industrial<\u002Fdiv>\n        <div class=\"brand-strip-lbl\">not a generic bot in a wrapper<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brand-strip-stat\">\n        <div class=\"brand-strip-num\">Plays with your stack<\u002Fdiv>\n        <div class=\"brand-strip-lbl\">CRM + ERP + custom integrations<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== HOW IT WORKS ========== -->\n<section class=\"how\" id=\"how\">\n  <div class=\"container\">\n    <div class=\"how-head\">\n      <span class=\"eyebrow\">How it works<\u002Fspan>\n      <h2>Three steps. No \"transformation initiative\" required.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"how-grid\">\n      <article class=\"how-step\">\n        <div class=\"how-step-num\">1<\u002Fdiv>\n        <div class=\"how-step-bar\" aria-hidden=\"true\"><\u002Fdiv>\n        <h3>We ingest your catalog.<\u002Fh3>\n        <p>SKU sheets, PDFs, that one spreadsheet Janet maintains, your existing helpdesk tickets — feed it all in. We turn it into something the bot can actually reason over. Takes about a week.<\u002Fp>\n        <ul class=\"how-step-list\">\n          <li>Catalog &amp; spec sheets<\u002Fli>\n          <li>Stock + lead time feed<\u002Fli>\n          <li>Shipping &amp; returns policy<\u002Fli>\n          <li>Past chat transcripts (optional, but it gets smarter)<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n      <article class=\"how-step\">\n        <div class=\"how-step-num\">2<\u002Fdiv>\n        <div class=\"how-step-bar\" aria-hidden=\"true\"><\u002Fdiv>\n        <h3>We drop the widget on your site.<\u002Fh3>\n        <p>One script tag. Or an embed. Or a popover. Matches your brand, your tone, your fonts. We don't make it look like a generic chatbot, because nobody trusts those.<\u002Fp>\n        <ul class=\"how-step-list\">\n          <li>Custom personality &amp; name<\u002Fli>\n          <li>Brand-matched UI<\u002Fli>\n          <li>Mobile, accessible, fast<\u002Fli>\n          <li>Works alongside your CRM<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n      <article class=\"how-step\">\n        <div class=\"how-step-num\">3<\u002Fdiv>\n        <div class=\"how-step-bar\" aria-hidden=\"true\"><\u002Fdiv>\n        <h3>It triages. You close.<\u002Fh3>\n        <p>The bot handles the FAQ. When a real buyer surfaces — bulk quantity, custom spec, urgency signal — it routes the conversation, with full context, to the right rep on your team. They pick up where the bot left off.<\u002Fp>\n        <ul class=\"how-step-list\">\n          <li>Live human handoff<\u002Fli>\n          <li>Slack / Teams / email alerts<\u002Fli>\n          <li>Full conversation transcript<\u002Fli>\n          <li>CRM auto-populated<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== ROUTING VISUALIZATION ========== -->\n<section class=\"routing\">\n  <div class=\"container\">\n    <div class=\"routing-head\">\n      <span class=\"eyebrow\">Smart routing<\u002Fspan>\n      <h2>Every conversation, scored in real time.<\u002Fh2>\n      <p class=\"lede\">The bot watches for high-value signals. When it sees them, it pulls in a human — with full context — before the buyer has a chance to bounce.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"routing-canvas\" role=\"img\" aria-label=\"Diagram showing visitor conversations being scored and routed to bot self-service or human handoff based on intent signals\">\n      <!-- LEFT: incoming -->\n      <div class=\"routing-col routing-col-in\">\n        <div class=\"routing-col-label\">Incoming visitors<\u002Fdiv>\n        <div class=\"routing-visitor\" style=\"--d: 0s\">\n          <div class=\"routing-avatar\">JL<\u002Fdiv>\n          <div class=\"routing-msg\">\"Do you ship to Ontario?\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"routing-visitor\" style=\"--d: 0.4s\">\n          <div class=\"routing-avatar\">RB<\u002Fdiv>\n          <div class=\"routing-msg\">\"3/4\" NPT fitting in stainless?\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"routing-visitor routing-visitor-hot\" style=\"--d: 0.8s\">\n          <div class=\"routing-avatar\">PC<\u002Fdiv>\n          <div class=\"routing-msg\">\"Need 800 units, recurring monthly. Quote?\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"routing-visitor\" style=\"--d: 1.2s\">\n          <div class=\"routing-avatar\">DM<\u002Fdiv>\n          <div class=\"routing-msg\">\"What's the lead time on bearings?\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MIDDLE: triage engine -->\n      <div class=\"routing-col routing-col-engine\">\n        <div class=\"routing-engine\">\n          <div class=\"routing-engine-ring\"><\u002Fdiv>\n          <div class=\"routing-engine-ring routing-engine-ring-2\"><\u002Fdiv>\n          <div class=\"routing-engine-core\">\n            <div class=\"routing-engine-label\">Olark AI<\u002Fdiv>\n            <div class=\"routing-engine-sub\">Intent scoring<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"routing-signals\">\n          <div class=\"routing-signal\">Quantity &gt; 100<\u002Fdiv>\n          <div class=\"routing-signal\">Custom spec<\u002Fdiv>\n          <div class=\"routing-signal\">\"line down\"<\u002Fdiv>\n          <div class=\"routing-signal\">PO mentioned<\u002Fdiv>\n          <div class=\"routing-signal\">Repeat visitor<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT: outcomes -->\n      <div class=\"routing-col routing-col-out\">\n        <div class=\"routing-outcome\">\n          <div class=\"routing-outcome-head\">\n            <span class=\"routing-outcome-icon routing-outcome-bot\">↻<\u002Fspan>\n            <div>\n              <div class=\"routing-outcome-title\">Self-serve<\u002Fdiv>\n              <div class=\"routing-outcome-sub\">Bot resolves instantly<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"routing-outcome-bar\"><span style=\"width: 87%\"><\u002Fspan><\u002Fdiv>\n          <div class=\"routing-outcome-pct\">87% of conversations<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"routing-outcome routing-outcome-hot\">\n          <div class=\"routing-outcome-head\">\n            <span class=\"routing-outcome-icon routing-outcome-human\">★<\u002Fspan>\n            <div>\n              <div class=\"routing-outcome-title\">Hot lead → human<\u002Fdiv>\n              <div class=\"routing-outcome-sub\">Routed with full context<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"routing-outcome-bar\"><span style=\"width: 13%; background: var(--rust)\"><\u002Fspan><\u002Fdiv>\n          <div class=\"routing-outcome-pct\">13% — your highest-value chats<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== TRANSCRIPT EXAMPLE ========== -->\n<section class=\"transcript\">\n  <div class=\"container\">\n    <div class=\"transcript-head\">\n      <span class=\"eyebrow\">Real conversation, real handoff<\u002Fspan>\n      <h2>What it actually looks like.<\u002Fh2>\n      <p class=\"lede\">Anonymized from a Crestline Industrial Supply chat, last Tuesday. The bot did the first three minutes. Marcus took over for the close.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"transcript-grid\">\n      <div class=\"transcript-conv\">\n        <div class=\"t-msg t-msg-bot\">\n          <div class=\"t-avatar t-avatar-bot\">B<\u002Fdiv>\n          <div class=\"t-bubble\">\n            <div class=\"t-name\">Boltz <span class=\"t-time\">2:14 PM<\u002Fspan><\u002Fdiv>\n            <p>Hey — Boltz here, Crestline's parts assistant. What're you looking for?<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-msg t-msg-user\">\n          <div class=\"t-bubble\">\n            <div class=\"t-name\">Visitor <span class=\"t-time\">2:14 PM<\u002Fspan><\u002Fdiv>\n            <p>Need 1.5 inch hydraulic fittings, 6000 PSI rated. SS preferred.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-msg t-msg-bot\">\n          <div class=\"t-avatar t-avatar-bot\">B<\u002Fdiv>\n          <div class=\"t-bubble\">\n            <div class=\"t-name\">Boltz <span class=\"t-time\">2:14 PM<\u002Fspan><\u002Fdiv>\n            <p>Got it. We stock the H6S-1500 series in 316 SS — rated to 6,000 PSI working, 24,000 burst. JIC and ORFS ends both in stock. How many were you needing?<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-msg t-msg-user\">\n          <div class=\"t-bubble\">\n            <div class=\"t-name\">Visitor <span class=\"t-time\">2:15 PM<\u002Fspan><\u002Fdiv>\n            <p>About 400 to start. We'd be ordering monthly, ongoing project.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-msg t-msg-bot\">\n          <div class=\"t-avatar t-avatar-bot\">B<\u002Fdiv>\n          <div class=\"t-bubble\">\n            <div class=\"t-name\">Boltz <span class=\"t-time\">2:15 PM<\u002Fspan><\u002Fdiv>\n            <p>That's a quote conversation — let me pull in Marcus from our industrial team. He'll have you sorted in under 10 minutes and can talk contract pricing.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"t-handoff\">\n          <div class=\"t-handoff-line\"><\u002Fdiv>\n          <span>Marcus joined · 2:16 PM<\u002Fspan>\n          <div class=\"t-handoff-line\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"t-msg t-msg-bot\">\n          <div class=\"t-avatar t-avatar-human\">M<\u002Fdiv>\n          <div class=\"t-bubble\">\n            <div class=\"t-name\">Marcus <span class=\"t-time\">2:16 PM<\u002Fspan><\u002Fdiv>\n            <p>Hey — Marcus here. I see you're looking at 400 H6S-1500 monthly, JIC or ORFS. For that volume on a recurring PO we can do 18% off list and prioritize stocking. What's your PO process look like?<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <aside class=\"transcript-card\">\n        <div class=\"transcript-card-head\">\n          <span class=\"tag\"><span class=\"tag-dot\"><\u002Fspan> Lead detected<\u002Fspan>\n          <h4>What the bot saw<\u002Fh4>\n        <\u002Fdiv>\n        <ul class=\"transcript-signals\">\n          <li><span class=\"t-sig-dot\"><\u002Fspan><div><strong>Specific spec<\u002Fstrong><span>1.5\" / 6000 PSI / SS<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"t-sig-dot\"><\u002Fspan><div><strong>Quantity signal<\u002Fstrong><span>400 units<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"t-sig-dot\"><\u002Fspan><div><strong>Recurring intent<\u002Fstrong><span>\"ordering monthly\"<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"t-sig-dot\"><\u002Fspan><div><strong>Project context<\u002Fstrong><span>\"ongoing project\"<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n        <div class=\"transcript-card-divider\"><\u002Fdiv>\n        <div class=\"transcript-card-meta\">\n          <div><span>Score<\u002Fspan><strong>92 / 100<\u002Fstrong><\u002Fdiv>\n          <div><span>Routed to<\u002Fspan><strong>Marcus R.<\u002Fstrong><\u002Fdiv>\n          <div><span>Handoff time<\u002Fspan><strong>1m 47s<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== STATS / OUTCOME ========== -->\n<section class=\"outcome\">\n  <div class=\"container\">\n    <div class=\"outcome-grid\">\n      <div class=\"outcome-text\">\n        <span class=\"eyebrow\">Why it matters<\u002Fspan>\n        <h2>We remove the cruft. Your team gets the chats that matter.<\u002Fh2>\n        <p class=\"lede\">Sales and marketing don't need more chats. They need <em>better<\u002Fem> chats. Olark filters out the repetitive stuff and feeds the warm, vetted leads into the systems your team already uses. More qualified pipeline. Fewer \"did anyone email back?\" moments. Buyers get answers immediately, your team gets to focus on what matters most: more business, more success stories.<\u002Fp>\n        <a href=\"#cta\" class=\"btn btn-teal btn-arrow\" style=\"margin-top: var(--s-5)\">See it on your site<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"outcome-stats\">\n        <div class=\"outcome-stat\">\n          <div class=\"outcome-stat-num\">+62%<\u002Fdiv>\n          <div class=\"outcome-stat-label\">RFQ volume<span>after 90 days<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"outcome-stat\">\n          <div class=\"outcome-stat-num\">11&nbsp;hrs<\u002Fdiv>\n          <div class=\"outcome-stat-label\">saved per rep<span>per week<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"outcome-stat\">\n          <div class=\"outcome-stat-num\">2.4&nbsp;sec<\u002Fdiv>\n          <div class=\"outcome-stat-label\">average reply<span>vs. 4hr industry avg<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"outcome-stat\">\n          <div class=\"outcome-stat-num\">$0<\u002Fdiv>\n          <div class=\"outcome-stat-label\">leads lost to \"did anyone email back?\"<span>(probably)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== HOW WE'RE DIFFERENT ========== -->\n<section class=\"different\">\n  <div class=\"container\">\n    <div class=\"different-grid\">\n      <div class=\"different-head\">\n        <span class=\"eyebrow\">How we're different<\u002Fspan>\n        <h2>Engineered for industrial supply.<\u002Fh2>\n        <p class=\"lede\">Plenty of bots. Plenty of AI. Almost none of them have spent 17 years listening to buyers ask the same five questions in fifteen different ways. We have. That's the difference.<\u002Fp>\n      <\u002Fdiv>\n      <ul class=\"different-list\">\n        <li class=\"different-item\">\n          <div class=\"different-icon\">01<\u002Fdiv>\n          <div>\n            <h3>Built for industrial, period.<\u002Fh3>\n            <p>We're not selling the same bot to dentists and SaaS startups. Every model, every routing rule, every default tone is calibrated for industrial buyers. It speaks in PSI, not vibes.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"different-item\">\n          <div class=\"different-icon\">02<\u002Fdiv>\n          <div>\n            <h3>Plays with your stack.<\u002Fh3>\n            <p>CRM, ERP, that custom thing your IT lead built in 2014 — we work with what you have and build the integration where one doesn't exist. No \"rip and replace.\" No new tools for your team to learn.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"different-item\">\n          <div class=\"different-icon\">03<\u002Fdiv>\n          <div>\n            <h3>It scans your site continuously.<\u002Fh3>\n            <p>Update a spec, change a price, add a new SKU — the bot picks it up. No quarterly retraining cycles. The information your buyer gets is the information that's actually live on your site.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"different-item\">\n          <div class=\"different-icon\">04<\u002Fdiv>\n          <div>\n            <h3>We still believe in humans.<\u002Fh3>\n            <p>The point isn't to remove your sales team from the conversation. It's to make sure they only get the conversations worth having. Olark enhances the human moment — it doesn't replace it.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== DEMO CTA ========== -->\n<section class=\"demo-cta\" id=\"demo\">\n  <div class=\"container\">\n    <div class=\"demo-cta-card\">\n      <span class=\"eyebrow\" style=\"color: var(--bg)\">Want a longer chat?<\u002Fspan>\n      <h2 style=\"color: var(--bg); max-width: 18ch\">Take the bot for a real test drive.<\u002Fh2>\n      <p style=\"color: oklch(0.85 0.02 200); max-width: 56ch; font-size: 1.1rem;\">We loaded a fictional industrial supplier — Crestline Industrial — into the demo bot. Ask it anything you'd ask your own buyers. See how it routes when things get serious.<\u002Fp>\n      <div style=\"display: flex; gap: var(--s-3); margin-top: var(--s-5); flex-wrap: wrap;\">\n        <a href=\"demo.html\" class=\"btn btn-teal btn-arrow\" style=\"background: var(--teal); color: white;\">Open full demo<\u002Fa>\n        <a href=\"how-it-works.html\" class=\"btn btn-ghost\" style=\"border-color: oklch(0.4 0.02 200); color: var(--bg);\">How the routing works<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== BOOK CTA ========== -->\n<section class=\"cta\" id=\"cta\">\n  <div class=\"container\">\n    <div class=\"cta-grid\">\n      <div>\n        <span class=\"eyebrow\">Book a demo<\u002Fspan>\n        <h2>20 minutes. We'll bring your catalog.<\u002Fh2>\n        <p class=\"lede\">Send us a link to your product pages. We'll have a working bot trained on your real catalog by the time we hop on the call. Worst case, you've spent 20 minutes. Best case, your sales team thanks you on Friday.<\u002Fp>\n        <ul class=\"cta-list\">\n          <li><span class=\"cta-tick\">✓<\u002Fspan> No \"discovery call\" before the demo<\u002Fli>\n          <li><span class=\"cta-tick\">✓<\u002Fspan> Working bot trained on your real catalog<\u002Fli>\n          <li><span class=\"cta-tick\">✓<\u002Fspan> Pricing on the call. No \"let me check with my manager.\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <form class=\"cta-form\" id=\"contact\" onsubmit=\"event.preventDefault(); this.querySelector('button').textContent='Sent — talk soon'; this.querySelector('button').disabled=true;\">\n        <h3 style=\"margin-bottom: var(--s-4)\">Tell us about your catalog<\u002Fh3>\n        <label class=\"field\">\n          <span>Work email<\u002Fspan>\n          <input type=\"email\" required=\"\" placeholder=\"you@company.com\">\n        <\u002Flabel>\n        <label class=\"field\">\n          <span>Company<\u002Fspan>\n          <input type=\"text\" required=\"\" placeholder=\"Acme Industrial Supply\">\n        <\u002Flabel>\n        <label class=\"field\">\n          <span>Catalog URL<\u002Fspan>\n          <input type=\"url\" placeholder=\"https://your-catalog.com\">\n        <\u002Flabel>\n        <label class=\"field\">\n          <span>What do you sell? (one line is fine)<\u002Fspan>\n          <textarea rows=\"2\" placeholder=\"Hydraulic fittings, valves, and pipe to municipal water systems.\"><\u002Ftextarea>\n        <\u002Flabel>\n        <button type=\"submit\" class=\"btn btn-primary btn-arrow\" style=\"width: 100%; justify-content: center;\">Book my demo<\u002Fbutton>\n        <p class=\"form-hint\">We'll reply within a business day. No \"nurture sequences,\" promise.<\u002Fp>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ========== FOOTER ========== -->\n<footer class=\"footer\">\n  <div class=\"container\">\n    <div class=\"footer-inner\">\n      <div>\n        <a href=\"index.html\" class=\"brand\" aria-label=\"Olark AI home\">\n          <span class=\"brand-mark\" aria-hidden=\"true\">O<\u002Fspan>\n          <span>Olark<span class=\"brand-ai\">.ai<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <p style=\"margin-top: var(--s-3); max-width: 32ch; color: var(--ink-2) -items: start;\n}\n.transcript-conv {\n  background: var(--bg-elev);\n  border: 1px solid var(--line);\n  border-radius: var(--r-3);\n  padding: var(--s-5);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-4);\n}\n.t-msg {\n  display: flex;\n  gap: var(--s-3);\n  max-width: 90%;\n}\n.t-msg-user { align-self: flex-end; flex-direction: row-reverse; }\n.t-avatar {\n  width: 32px; height: 32px;\n  border-radius: 8px;\n  display: grid;\n  place-items: center;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 0.85rem;\n  flex-shrink: 0;\n}\n.t-avatar-bot { background: var(--ink); color: var(--bg); }\n.t-avatar-human { background: var(--rust); color: white; }\n.t-bubble {\n  background: var(--bg-deep);\n  padding: var(--s-3) var(--s-4);\n  border-radius: var(--r-2);\n  font-size: 0.94rem;\n}\n.t-msg-user .t-bubble {\n  background: var(--ink);\n  color: var(--bg);\n}\n.t-name {\n  font-weight: 600;\n  font-size: 0.78rem;\n  margin-bottom: 4px;\n  display: flex;\n  gap: var(--s-2);\n  align-items: center;\n}\n.t-msg-user .t-name { color: oklch(0.85 0.02 200); }\n.t-time {\n  font-weight: 400;\n  color: var(--ink-3);\n  font-family: var(--font-mono);\n  font-size: 0.72rem;\n}\n.t-msg-user .t-time { color: oklch(0.7 0.02 200); }\n.t-bubble p { margin: 0; }\n\n.t-handoff {\n  display: flex;\n  align-items: center;\n  gap: var(--s-3);\n  font-family: var(--font-mono);\n  font-size: 0.74rem;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--rust);\n  margin: var(--s-3) 0;\n}\n.t-handoff-line {\n  flex: 1;\n  height: 1px;\n  background: var(--rust);\n  opacity: 0.4;\n}\n\n.transcript-card {\n  background: var(--bg-elev);\n  border: 1px solid var(--line);\n  border-radius: var(--r-3);\n  padding: var(--s-5);\n  position: sticky;\n  top: 100px;\n}\n.transcript-card-head h4 { margin-top: var(--s-3); }\n.transcript-signals {\n  list-style: none;\n  padding: 0;\n  margin: var(--s-4) 0 0;\n  display: grid;\n  gap: var(--s-3);\n}\n.transcript-signals li {\n  display: flex;\n  gap: var(--s-3);\n  align-items: flex-start;\n}\n.transcript-signals li > div { display: flex; flex-direction: column; }\n.transcript-signals strong { font-size: 0.92rem; }\n.transcript-signals span { font-size: 0.84rem; color: var(--ink-2); }\n.t-sig-dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--teal);\n  margin-top: 7px;\n  flex-shrink: 0;\n}\n.transcript-card-divider {\n  height: 1px;\n  background: var(--line);\n  margin: var(--s-4) 0;\n}\n.transcript-card-meta {\n  display: grid;\n  gap: var(--s-3);\n}\n.transcript-card-meta > div {\n  display: flex;\n  justify-content: space-between;\n  font-size: 0.9rem;\n}\n.transcript-card-meta span { color: var(--ink-2); }\n.transcript-card-meta strong { font-family: var(--font-display); }\n\n@media (max-width: 960px) {\n  .transcript-grid { grid-template-columns: 1fr; }\n  .transcript-card { position: static; }\n}\n\n/* BRAND STRIP — industrial caution-stripe header */\n.brand-strip {\n  background: var(--ink);\n  color: white;\n  padding: var(--s-7) 0;\n  position: relative;\n  border-top: 0;\n}\n.brand-strip::before {\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 14px;\n  background-image: repeating-linear-gradient(\n    -45deg,\n    var(--yellow) 0,\n    var(--yellow) 14px,\n    #000 14px,\n    #000 28px\n  );\n}\n.brand-strip::after {\n  content: \"\";\n  position: absolute;\n  inset: 14px 0 0 0;\n  background-image:\n    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);\n  background-size: 32px 32px;\n  pointer-events: none;\n}\n.brand-strip .container { position: relative; z-index: 1; }\n.brand-strip-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: var(--s-5);\n  align-items: center;\n}\n.brand-strip-stat {\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-2);\n  padding: 0 var(--s-4);\ grid;\n  grid-template-columns: 1fr 1fr;\n  gap: var(--s-3);\n}\n.outcome-stat {\n  background: var(--bg-elev);\n  border: 1px solid var(--line);\n  border-radius: 4px;\n  padding: var(--s-5);\n  position: relative;\n  overflow: hidden;\n}\n.outcome-stat::before {\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 4px;\n  background-image: repeating-linear-gradient(\n    90deg,\n    currentColor 0,\n    currentColor 8px,\n    transparent 8px,\n    transparent 12px\n  );\n  opacity: 0.5;\n}\n.outcome-stat:nth-child(1) { background: var(--purple-soft); border-color: var(--purple); color: var(--purple); }\n.outcome-stat:nth-child(2) { background: var(--green-soft); border-color: var(--green-text); color: var(--green-text); }\n.outcome-stat:nth-child(3) { background: var(--sun-soft); border-color: var(--sun-text); color: var(--sun-text); }\n.outcome-stat:nth-child(4) { background: var(--ink); color: var(--bg); border-color: var(--ink); }\n.outcome-stat:nth-child(4)::before { color: var(--yellow); opacity: 1; }\n.outcome-stat-num {\n  font-family: var(--font-display);\n  font-size: clamp(2rem, 4vw, 2.8rem);\n  font-weight: 700;\n  letter-spacing: -0.03em;\n  line-height: 1;\n  font-feature-settings: \"tnum\" 1;\n  color: var(--ink);\n}\n.outcome-stat:nth-child(4) .outcome-stat-num { color: white; }\n.outcome-stat-label {\n  margin-top: var(--s-3);\n  font-size: 0.92rem;\n  color: var(--ink-2);\n  display: flex;\n  flex-direction: column;\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n}\n.outcome-stat:nth-child(4) .outcome-stat-label { color: oklch(0.8 0.02 200); }\n.outcome-stat:nth-child(1) .outcome-stat-label { color: var(--purple-ink); }\n.outcome-stat:nth-child(2) .outcome-stat-label { color: var(--green-ink); }\n.outcome-stat:nth-child(3) .outcome-stat-label { color: var(--sun-text); }\n.outcome-stat-label span {\n  font-size: 0.8rem;\n  color: var(--ink-3);\n  margin-top: 2px;\n}\n.outcome-
